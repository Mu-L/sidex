<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SideX</title>
    <script type="module" src="/src/main.ts" defer></script>
    <style>
      /* Minimal reset — VSCode's workbench.ts renders everything dynamically */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1e1e1e;
        color: #cccccc;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        font-size: 13px;
      }
      /* Loading indicator before workbench boots */
      body::before {
        content: 'Loading SideX...';
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        inset: 0;
        font-size: 14px;
        color: #666;
        z-index: -1;
      }
    </style>
  </head>
  <body aria-label="">
    <!-- VSCode's Workbench class renders all DOM dynamically into document.body -->
    <!-- See: src/vs/workbench/browser/workbench.ts -> renderWorkbench() -->
  </body>
</html>
